<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hang out with me?</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:pink;
  font-family:Arial;
}

.card {
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button {
  padding:10px 20px;
  margin:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.primary {
  background:#ff4d6d;
  color:white;
}

#noBtn {
  position:absolute;
  background:gray;
  color:white;
}

.meme {
  width:150px;
  margin-top:15px;
}
</style>
</head>

<body>

<div id="app" class="card"></div>

<script>
const app = document.getElementById("app");

let selectedDate, selectedTime, idea="", flower="";

const ENDPOINT = "https://formspree.io/f/xreonyej";

const memes = [
  "https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif",
  "https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif",
  "https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif",
  "https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif",
  "https://media.giphy.com/media/13borq7Zo2kulO/giphy.gif",
  "https://media.giphy.com/media/l0HlNaQ6gWfllcjDO/giphy.gif"
];

const meme = (i)=>`<img class="meme" src="${memes[i]}">`;

// PAGE 1
function page1(){
  app.innerHTML = `
    <h1>Hang out with me, pleaseeeeeee???? 🥺</h1>
    <button class="primary" onclick="page2()">Yes 💕</button>
    <button id="noBtn" onmouseover="moveNo()">No 😢</button>
    ${meme(0)}
  `;
}

function moveNo(){
  const btn = document.getElementById("noBtn");
  btn.style.left = Math.random()*300 + "px";
  btn.style.top = Math.random()*300 + "px";
}

// PAGE 2
function page2(){
  let html = "";
  for(let i=18;i<=25;i++){
    html += `<button onclick="selectDate(${i})">April ${i}</button>`;
  }

  app.innerHTML = `
    <h2>Pick a date 📅</h2>
    ${html}
    ${meme(1)}
  `;
}

function selectDate(d){
  selectedDate = d;
  page3();
}

// PAGE 3
function page3(){
  app.innerHTML = `
    <h2>April ${selectedDate}</h2>
    <p>Lunch or Dinner?</p>
    <button class="primary" onclick="selectTime('Lunch')">Lunch</button>
    <button class="primary" onclick="selectTime('Dinner')">Dinner</button>
    ${meme(2)}
  `;
}

function selectTime(t){
  selectedTime = t;
  page4();
}

// PAGE 4
function page4(){
  app.innerHTML = `
    <p>Do you have any idea for the location or what would you like to try on the date?</p>
    <textarea id="ideaInput"></textarea><br>
    <button class="primary" onclick="submitIdea()">Submit</button>
    <button onclick="noIdea()">Nope!</button>
    ${meme(3)}
  `;
}

function submitIdea(){
  idea = document.getElementById("ideaInput").value;
  page5();
}

function noIdea(){
  idea = "";
  app.innerHTML = `
    <h2>Then I'll decide everything 😏</h2>
    <button class="primary" onclick="page5()">Continue</button>
    ${meme(3)}
  `;
}

// PAGE 5
function page5(){
  app.innerHTML = `
    <p>Would you like some flower on that day? 🌸</p>
    <button class="primary" onclick="selectFlower('Yes')">Yes</button>
    <button onclick="selectFlower('No')">No</button>
    ${meme(4)}
  `;
}

function selectFlower(f){
  flower = f;
  page6();
}

// SEND DATA
function sendData(){
  fetch(ENDPOINT,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      date: "April " + selectedDate,
      time: selectedTime,
      idea: idea || "No idea",
      flower: flower
    })
  });
}

// PAGE 6
function page6(){
  sendData();

  app.innerHTML = `
    <h1>Copy that. See yaaaa ! 😳💖</h1>
    <p>April ${selectedDate} - ${selectedTime}</p>
    <p>${idea || "I'll plan everything 😏"}</p>
    <p>Flower: ${flower}</p>
    ${meme(5)}
  `;
}

page1();
</script>

</body>
</html>
